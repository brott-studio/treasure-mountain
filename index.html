<!doctype html>
<html lang="en" data-theme="light" style="color-scheme: light;">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="color-scheme" content="light" />
  <meta name="theme-color" content="#f4e8c8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <title>Berry Dragon's Land</title>
  <style>
    /* =========================================================
       FORCE LIGHT MODE (ignore device dark/high-contrast)
       ========================================================= */
    :root { color-scheme: light only; forced-color-adjust: none; }
    @media (prefers-color-scheme: dark) {
      :root { color-scheme: light only; }
      html, body { background: #f4e8c8 !important; color: #000 !important; }
    }
    @media (forced-colors: active) {
      * { forced-color-adjust: none !important; }
      html, body { background: #f4e8c8 !important; color: #000 !important; }
    }
    /* iOS Smart Invert guard: mark all images/art as non-invertible */
    img, svg { -webkit-filter: none !important; filter: none !important; }

    /* =========================================================
       RESET + BASE
       ========================================================= */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body {
      margin: 0; padding: 0;
      width: 100%; height: 100%;
      overflow: hidden;
      background: #f4e8c8 !important;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      color: #000 !important;
      touch-action: manipulation;
      user-select: none;
      -webkit-user-select: none;
    }
    button { font: inherit; color: inherit; }

    /* =========================================================
       APP LAYOUT
       ========================================================= */
    #app {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }

    /* =========================================================
       MAP SCREEN
       ========================================================= */
    #map-screen {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at center, #2a1f18 0%, #0e0906 100%);
    }
    #map-frame {
      /* Holds the image; hotspots position against this */
      position: relative;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }
    #map-img {
      max-width: 100%;
      max-height: 100%;
      width: auto; height: auto;
      object-fit: contain;
      display: block;
      box-shadow: 0 10px 60px rgba(0,0,0,0.6);
      border-radius: 4px;
      pointer-events: none;
      user-select: none;
      -webkit-user-drag: none;
    }
    /* Hotspot container sits exactly over the rendered image */
    #hotspots {
      position: absolute;
      top: 0; left: 0;
      /* width/height set by JS to match rendered image */
      pointer-events: none;
    }
    .hotspot {
      position: absolute;
      transform: translate(-50%, -50%);
      /* Big tap target */
      width: 80px; height: 80px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      pointer-events: auto;
      background: transparent !important;
      border: none !important;
      outline: none;
      padding: 0;
      -webkit-appearance: none;
      appearance: none;
      -webkit-tap-highlight-color: transparent;
    }
    /* Pulsing SVG dot — SVG fill colors are NOT touched by browser dark-mode inverters
       (e.g. DuckDuckGo Android's force-dark) the way CSS backgrounds can be. */
    .hotspot .dot {
      width: 24px; height: 24px;
      display: block;
      animation: pulse 1.6s ease-in-out infinite;
      overflow: visible;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(0.85); }
      50%      { transform: scale(1.25); }
    }
    /* DEV mode: show the tap target ring */
    .hotspot-dev .hotspot {
      background: rgba(255, 0, 255, 0.12);
      border: 2px dashed rgba(255, 0, 255, 0.7);
    }
    .hotspot-dev .hotspot-label {
      position: absolute;
      top: 100%; left: 50%;
      transform: translate(-50%, 4px);
      font-size: 11px;
      background: rgba(0,0,0,0.7);
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
      pointer-events: none;
    }
    .hotspot-label { display: none; }

    /* =========================================================
       ZONE SCREEN (overlay)
       ========================================================= */
    #zone-screen {
      position: absolute; inset: 0;
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      overflow: hidden;
    }
    #zone-screen.active { display: flex; animation: zone-fade-in 280ms ease; }
    @keyframes zone-fade-in {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    #zone-stage {
      position: relative;
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
    }

    /* Back arrow */
    #back-btn {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      left: max(16px, env(safe-area-inset-left));
      width: 104px; height: 104px;
      border-radius: 50%;
      background: rgba(255,255,255,0.95);
      border: 4px solid #333;
      color: #222;
      font-size: 56px;
      font-weight: 900;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      z-index: 10;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      animation: backPulse 2s ease-in-out infinite;
    }
    #back-btn:active { transform: scale(0.92); }
    @keyframes backPulse {
      0%, 100% { box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 0 rgba(255,255,255,0.6); }
      50%      { box-shadow: 0 4px 16px rgba(0,0,0,0.4), 0 0 0 14px rgba(255,255,255,0); }
    }

    /* ---- Vacation Island (polished) ---- */
    /* Backgrounds rendered via inline SVG inside .sky-svg to avoid browser
       force-dark inverters (DuckDuckGo Android etc.) mangling CSS gradients. */
    .sky {
      position: absolute; inset: 0;
      overflow: hidden;
    }
    .sky-svg { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }
    .sky-svg .layer { transition: opacity 1.2s ease; }

    .sun {
      position: absolute;
      left: 50%;
      width: 110px; height: 110px;
      transform: translate(-50%, 0);
      /* --sun-y: 0 = just above horizon, 1 = high in sky (~noon).
         Horizon rect is at ~62–82% of stage height, so bottom must stay > 38% at sun-y=0. */
      bottom: calc(42% + (38vh * var(--sun-y, 0)));
      cursor: pointer;
      background: transparent !important;
      border: none !important;
      transition: bottom 1.4s cubic-bezier(.4, .0, .2, 1);
      /* Intentionally no box-shadow: DuckDuckGo force-dark inverts CSS shadows. */
    }
    .sun svg { width: 100%; height: 100%; display: block; overflow: visible; }
    .sun:active { transform: translate(-50%, 0) scale(0.94); }

    /* ---- Legacy stub (unused; kept briefly for safety) ---- */
    .stub { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }

    /* Paper-texture cream base for polished zones — matches map vibe */
    .paper-bg {
      background-color: #f4e8c8;
      background-image:
        radial-gradient(rgba(180,140,80,0.12) 1px, transparent 1px),
        radial-gradient(rgba(120,90,50,0.08) 1px, transparent 1px),
        linear-gradient(135deg, #f4e8c8 0%, #ecd9a6 100%);
      background-size: 6px 6px, 11px 11px, 100% 100%;
      background-position: 0 0, 3px 3px, 0 0;
    }

    /* Polished-zone shared layout */
    .pz-stage {
      position: absolute; inset: 0;
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .pz-art {
      position: relative;
      max-width: 90vw;
      max-height: 85vh;
      width: auto; height: auto;
      object-fit: contain;
      filter: drop-shadow(0 6px 18px rgba(60,40,20,0.35));
      pointer-events: auto;
      -webkit-user-drag: none;
      user-select: none;
      touch-action: manipulation;
      cursor: pointer;
    }
    /* iOS Safari: make all in-zone interactive elements use manipulation
       so taps aren't eaten by double-tap-zoom / pan detection. */
    .teddy, .chest, .cloud, .berry-bush, .dragon-body, .sun-ball,
    .hotspot, .back-btn, .pz-layer > * {
      touch-action: manipulation;
    }
    .pz-layer {
      position: absolute;
      pointer-events: none;
    }

    /* Fish SVG for Sea of Wave */
    .fish {
      position: absolute;
      width: 60px; height: 40px;
      pointer-events: none;
      will-change: transform;
    }
    @keyframes fish-arc {
      0%   { transform: translate(-50%, 20px) scale(0.6) rotate(-10deg); opacity: 0; }
      15%  { transform: translate(-50%, -10px) scale(1) rotate(-20deg); opacity: 1; }
      50%  { transform: translate(-50%, -120px) scale(1.05) rotate(5deg); opacity: 1; }
      85%  { transform: translate(-50%, 10px) scale(1) rotate(30deg); opacity: 1; }
      100% { transform: translate(-50%, 40px) scale(0.7) rotate(45deg); opacity: 0; }
    }

    /* Maze drawing canvas */
    #maze-svg {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: auto;
      touch-action: none;
    }
    .maze-stroke {
      fill: none;
      stroke: url(#goldGrad);
      stroke-width: 10;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 6px rgba(255,210,80,0.9));
    }
    .maze-stroke.fading {
      transition: opacity 1.8s ease;
      opacity: 0;
    }

    /* Sparkle particle */
    .spark {
      position: absolute;
      width: 14px; height: 14px;
      pointer-events: none;
      will-change: transform, opacity;
    }
    @keyframes spark-fly {
      0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx,0px)), calc(-50% + var(--dy,0px))) scale(1.1); opacity: 0; }
    }

    /* ---- Per-stub background colors (legacy, kept for safety) ---- */
    .bg-fallback { background: linear-gradient(to bottom, #cda0e6, #5a2a7a); }

    /* =========================================================
       LOADING + HINT
       ========================================================= */
    #hint {
      position: absolute;
      bottom: max(20px, env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.55);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      color: #fff;
      opacity: 0.75;
      pointer-events: none;
      white-space: nowrap;
    }
    #hint.hidden { opacity: 0; transition: opacity 0.6s ease; }

    /* =========================================================
       v0.4 NEW-ZONE STYLES
       ========================================================= */
    /* House-boat ripple */
    .ripple {
      position: absolute;
      border: 3px solid rgba(80, 160, 220, 0.75);
      border-radius: 50%;
      pointer-events: none;
      transform: translate(-50%, -50%);
      animation: ripple-expand 1200ms ease-out forwards;
    }
    @keyframes ripple-expand {
      0%   { width: 10px; height: 10px; opacity: 0.9; border-width: 3px; }
      100% { width: 220px; height: 220px; opacity: 0; border-width: 1px; }
    }
    /* House-boat bobbing */
    @keyframes boat-bob {
      0%,100% { transform: translate(0,0) rotate(0); }
      25% { transform: translate(0,-10px) rotate(-2deg); }
      50% { transform: translate(0,4px) rotate(1deg); }
      75% { transform: translate(0,-6px) rotate(2deg); }
    }
    .bobbing { animation: boat-bob 0.9s ease-in-out; }

    /* Butterflies */
    .butterfly {
      position: absolute;
      width: 40px; height: 32px;
      pointer-events: none;
      will-change: transform, opacity;
    }
    .butterfly svg { width:100%; height:100%; }
    .butterfly .wing { transform-origin: 20px 16px; animation: flap 160ms ease-in-out infinite alternate; }
    .butterfly .wing.r { transform-origin: 20px 16px; }
    @keyframes flap {
      0% { transform: scaleX(1); }
      100% { transform: scaleX(0.35); }
    }
    @keyframes butterfly-fly {
      0%   { transform: translate(0, 0) rotate(-10deg); opacity: 0; }
      15%  { opacity: 1; }
      100% { transform: translate(var(--fx,0), var(--fy,-360px)) rotate(var(--fr,10deg)); opacity: 0; }
    }

    /* Forest peekers */
    .peeker {
      position: absolute;
      font-size: 84px;
      pointer-events: none;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
      will-change: transform, opacity;
    }
    @keyframes peek-in {
      0%   { transform: translate(-50%, 40px) scale(0.4); opacity: 0; }
      30%  { transform: translate(-50%, -6px) scale(1.1); opacity: 1; }
      70%  { transform: translate(-50%, -6px) scale(1); opacity: 1; }
      100% { transform: translate(-50%, 40px) scale(0.5); opacity: 0; }
    }

    /* Desert tumbleweed */
    .tumbleweed {
      position: absolute;
      width: 64px;
      height: 64px;
      pointer-events: none;
      filter: drop-shadow(0 4px 6px rgba(80,60,20,0.45));
      will-change: transform;
    }
    .tumbleweed svg { width: 100%; height: 100%; }
    @keyframes tumble-roll {
      0%   { transform: translate(0,0) rotate(0deg); }
      100% { transform: translate(var(--tx, 120vw), var(--ty, -20px)) rotate(var(--tr, 1440deg)); }
    }

    /* Desert treasure pops */
    .treasure-pop {
      position: absolute;
      font-size: 64px;
      pointer-events: none;
      filter: drop-shadow(0 4px 8px rgba(80,50,10,0.5));
      will-change: transform, opacity;
    }
    @keyframes pop-float {
      0%   { transform: translate(-50%, 0) scale(0.4); opacity: 0; }
      20%  { transform: translate(-50%, -20px) scale(1.2); opacity: 1; }
      100% { transform: translate(-50%, -140px) scale(0.9); opacity: 0; }
    }

    /* Fog clouds */
    .fog-cloud {
      position: absolute;
      width: 180px; height: 120px;
      cursor: pointer;
      pointer-events: auto;
      will-change: transform, opacity;
      filter: drop-shadow(0 4px 10px rgba(0,0,0,0.2));
    }
    .fog-cloud svg { width:100%; height:100%; }
    .fog-cloud.drift { animation: fog-drift var(--fog-dur, 22s) linear infinite; }
    @keyframes fog-drift {
      0%   { transform: translate(0,0); }
      50%  { transform: translate(var(--fog-dx,40px), var(--fog-dy,-20px)); }
      100% { transform: translate(0,0); }
    }
    .fog-cloud.puff { animation: fog-puff 650ms ease-out forwards; pointer-events: none; }
    @keyframes fog-puff {
      0%   { opacity: 1; transform: scale(1); }
      100% { opacity: 0; transform: scale(2); }
    }

    /* Footprints */
    .footprint {
      position: absolute;
      font-size: 44px;
      pointer-events: none;
      transform: translate(-50%, -50%) rotate(var(--fp-rot, 0deg));
      transition: opacity 4s ease-out;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.4));
    }
    .footprint.fading { opacity: 0; }

    /* Berries */
    .berry-counter {
      position: absolute;
      top: max(16px, env(safe-area-inset-top));
      right: max(16px, env(safe-area-inset-right));
      padding: 10px 18px;
      border-radius: 22px;
      background: rgba(90, 30, 90, 0.85);
      color: #fff;
      font-size: 22px;
      font-weight: 800;
      z-index: 10;
      box-shadow: 0 4px 10px rgba(0,0,0,0.35);
    }
    .basket {
      position: absolute;
      left: 50%; bottom: 18px;
      transform: translateX(-50%);
      font-size: 90px;
      pointer-events: none;
      filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
      z-index: 5;
    }
    .berry {
      position: absolute;
      width: 28px; height: 28px;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
      box-shadow: inset -4px -4px 8px rgba(0,0,0,0.3), 0 2px 4px rgba(0,0,0,0.3);
    }
    @keyframes berry-tumble {
      0%   { transform: translate(0,0) scale(0.6); opacity: 0; }
      15%  { transform: translate(calc(var(--bx,0px) * 0.3), -30px) scale(1.1); opacity: 1; }
      100% { transform: translate(var(--bx,0px), var(--by,400px)) scale(0.9) rotate(var(--br,360deg)); opacity: 1; }
    }
    @keyframes berry-fade { to { opacity: 0; } }

    /* Dragon rainbow */
    .rainbow {
      position: absolute;
      width: 240px; height: 120px;
      pointer-events: none;
      will-change: transform, opacity;
    }
    @keyframes rainbow-spit {
      0%   { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
      25%  { transform: translate(-50%, -80%) scale(1.1); opacity: 1; }
      100% { transform: translate(-50%, -140%) scale(1.4); opacity: 0; }
    }
    .flying-berry {
      position: absolute;
      width: 32px; height: 32px;
      border-radius: 50%;
      pointer-events: none;
      will-change: transform, opacity;
      box-shadow: inset -5px -5px 10px rgba(0,0,0,0.4), 0 2px 6px rgba(0,0,0,0.4);
    }
    .dragon-chomp { animation: dragon-chomp 250ms ease-in-out; }
    @keyframes dragon-chomp {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.06); }
    }

    /* Quicksand teddy */
    .teddy {
      position: absolute;
      left: 50%;
      top: 38%;
      transform: translate(-50%, var(--sink, 0px));
      font-size: 90px;
      cursor: pointer;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.45));
      transition: transform 0.2s cubic-bezier(.2,.9,.3,1);
      z-index: 5;
      pointer-events: auto;
    }
    .teddy.rescued { animation: rescue-bounce 900ms ease-out; }
    @keyframes rescue-bounce {
      0%,100% { transform: translate(-50%, var(--sink,0px)); }
      50%     { transform: translate(-50%, calc(var(--sink,0px) - 60px)) scale(1.2) rotate(10deg); }
    }

    /* Confetti */
    .confetti {
      position: absolute;
      width: 12px; height: 16px;
      pointer-events: none;
      will-change: transform, opacity;
    }
    @keyframes confetti-fly {
      0%   { transform: translate(0,0) rotate(0); opacity: 1; }
      100% { transform: translate(var(--cx,0px), var(--cy,-400px)) rotate(var(--cr,720deg)); opacity: 0; }
    }

    /* Treasure chest */
    .chest {
      position: absolute;
      left: 50%; top: 38%;
      transform: translate(-50%, -50%);
      font-size: 110px;
      cursor: pointer;
      filter: drop-shadow(0 6px 10px rgba(0,0,0,0.45));
      z-index: 5;
      pointer-events: auto;
    }
    .chest.wobble { animation: chest-wobble 400ms ease-in-out; }
    @keyframes chest-wobble {
      0%,100% { transform: translate(-50%,-50%) rotate(0); }
      25% { transform: translate(-50%,-50%) rotate(-8deg) scale(1.1); }
      75% { transform: translate(-50%,-50%) rotate(8deg) scale(1.1); }
    }

    /* Prairie grass blades (ripple effect) */
    .grass-blade {
      position: absolute;
      width: 6px; height: 28px;
      pointer-events: none;
      transform-origin: 50% 100%;
      will-change: transform;
      z-index: 3;
    }
    .grass-blade svg { display:block; width:100%; height:100%; overflow:visible; }
    @keyframes grass-bend {
      0%   { transform: rotate(0deg); }
      35%  { transform: rotate(var(--bend, -24deg)); }
      100% { transform: rotate(0deg); }
    }

    /* Quicksand bubbles */
    .mud-bubble {
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
      background: radial-gradient(circle at 35% 30%, #d4b173 0%, #a67a3a 45%, #6b4821 90%);
      box-shadow: inset -3px -4px 6px rgba(0,0,0,0.35), 0 2px 4px rgba(0,0,0,0.3);
      will-change: transform, opacity;
      z-index: 4;
    }
    @keyframes mud-bubble-rise {
      0%   { transform: translate(0,0) scale(0.4); opacity: 0; }
      15%  { opacity: 1; }
      80%  { transform: translate(var(--bx,0px), var(--by,-120px)) scale(1.1); opacity: 1; }
      100% { transform: translate(var(--bx,0px), var(--by,-120px)) scale(1.5); opacity: 0; }
    }

    /* Treasure X-marks-the-spot */
    .x-mark {
      position: absolute;
      transform: translate(-50%,-50%);
      width: 72px;
      height: 72px;
      cursor: pointer;
      z-index: 6;
      animation: x-pulse 1.2s ease-in-out infinite;
      user-select: none;
      pointer-events: auto;
      filter: drop-shadow(0 0 12px rgba(255, 215, 80, 0.85)) drop-shadow(0 0 4px #fff);
    }
    .x-mark svg { width: 100%; height: 100%; display: block; overflow: visible; }
    @keyframes x-pulse {
      0%,100% { transform: translate(-50%,-50%) scale(1); }
      50%     { transform: translate(-50%,-50%) scale(1.18); }
    }
    .x-mark.fading { animation: x-fade 300ms ease-out forwards; }
    @keyframes x-fade {
      to { opacity: 0; transform: translate(-50%,-50%) scale(0.5); }
    }
    .dirt-puff {
      position: absolute;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 40%, #a87a48 0%, #6b4821 70%, #3d2a12 100%);
      pointer-events: none;
      transform: translate(-50%,-50%);
      will-change: transform, opacity;
      z-index: 5;
    }
    @keyframes dirt-fly {
      0%   { transform: translate(-50%,-50%) scale(0.4); opacity: 1; }
      100% { transform: translate(calc(-50% + var(--dx,0px)), calc(-50% + var(--dy,0px))) scale(1.2); opacity: 0; }
    }
    .treasure-chest {
      position: absolute;
      transform: translate(-50%, 40px) scale(0.3);
      opacity: 0;
      width: 180px;
      height: auto;
      cursor: pointer;
      filter: drop-shadow(0 8px 14px rgba(0,0,0,0.45));
      z-index: 6;
      pointer-events: auto;
      transition: transform 500ms cubic-bezier(.2,1.4,.4,1), opacity 300ms ease-out;
    }
    .treasure-chest img { width: 100%; height: auto; display: block; pointer-events: none; }
    .treasure-chest.risen {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }
    .treasure-chest.wobble { animation: chest-wobble-risen 400ms ease-in-out; }
    @keyframes chest-wobble-risen {
      0%,100% { transform: translate(-50%,-50%) rotate(0) scale(1); }
      25% { transform: translate(-50%,-50%) rotate(-10deg) scale(1.12); }
      75% { transform: translate(-50%,-50%) rotate(10deg) scale(1.12); }
    }

    /* Compass */
    .compass-needle-overlay {
      position: absolute;
      width: 22%;  /* roughly spans the inner wheel of the drawn compass */
      aspect-ratio: 1 / 1;
      max-width: 180px;
      pointer-events: none; /* let clicks fall through to the image */
      z-index: 5;
      filter: drop-shadow(0 3px 6px rgba(0,0,0,0.35));
      transform: translate(-50%, -50%);
    }
    .compass-needle-overlay svg {
      display: block;
      width: 100%;
      height: 100%;
      overflow: visible;
    }
    .compass-needle {
      transform-origin: 100px 100px;
      transform: rotate(0deg);
      transition: transform 400ms cubic-bezier(.3,1.4,.5,1);
    }

  </style>
</head>
<body>
  <div id="app">
    <!-- ============================================
         MAP SCREEN
         ============================================ -->
    <div id="map-screen">
      <div id="map-frame">
        <img id="map-img" src="./assets/map-web.jpg" alt="Berry Dragon's Land" />
        <div id="hotspots"></div>
      </div>
      <div id="hint">✨ tap a glowing dot ✨</div>
    </div>

    <!-- ============================================
         ZONE SCREEN (populated dynamically)
         ============================================ -->
    <div id="zone-screen">
      <button id="back-btn" aria-label="Back to map">←</button>
      <div id="zone-stage"></div>
    </div>
  </div>

  <script>
  /* =============================================================
     CONFIG — tweak hotspot positions here (normalized 0..1)
     (0,0) = top-left of the map image, (1,1) = bottom-right.
     ============================================================= */
  window.DEV = false; // flip to true to visualize hotspots

  const ZONES = [
    { id: 'house-boat',        name: 'House-boat',         x: 0.14, y: 0.05, kind: 'houseboat' },
    { id: 'sea-of-wave',       name: 'Sea of Wave',        x: 0.26, y: 0.20, kind: 'sea' },
    { id: 'vacation-island',   name: 'Vacation Island',    x: 0.11, y: 0.34, kind: 'vacation' },
    { id: 'treeless-prairie',  name: 'Treeless Prairie',   x: 0.11, y: 0.62, kind: 'prairie' },
    { id: 'fantastic-forest',  name: 'Fantastic Forest',   x: 0.23, y: 0.42, kind: 'forest' },
    { id: 'golden-maze',       name: 'Golden Maze of Gold',x: 0.48, y: 0.28, kind: 'maze' },
    { id: 'deserted-desert',   name: 'Deserted Desert',    x: 0.36, y: 0.50, kind: 'desert' },
    { id: 'fog',               name: 'Fog of Misdirection',x: 0.77, y: 0.32, kind: 'fog' },
    { id: 'dirty-path',        name: 'Dirty Path of Dirt', x: 0.60, y: 0.52, kind: 'path' },
    { id: 'dragonberries',     name: 'Dragonberries',      x: 0.39, y: 0.72, kind: 'berries' },
    { id: 'berry-dragon',      name: 'Berry Dragon',       x: 0.55, y: 0.76, kind: 'dragon' },
    { id: 'quicksand',         name: 'Quicksand Pool',     x: 0.66, y: 0.88, kind: 'quicksand' },
    { id: 'treasure-mountain', name: 'Treasure Mountain',  x: 0.84, y: 0.70, kind: 'treasure' },
    { id: 'compass',           name: 'Compass',            x: 0.87, y: 0.08, kind: 'compass' },
  ];

  /* =============================================================
     AUDIO — Web Audio API, enabled on first user gesture
     ============================================================= */
  let audioCtx = null;
  let audioReady = false;

  function enableAudio() {
    if (audioReady) return;
    try {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === "suspended") audioCtx.resume();
      audioReady = true;
    } catch (e) {
      console.warn("Audio unavailable", e);
    }
  }

  function tone(freq, dur = 0.25, type = "sine", gain = 0.15, when = 0) {
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime + when;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(gain, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t0);
    osc.stop(t0 + dur + 0.05);
  }

  function chord(freqs, dur = 0.4, type = "sine", gain = 0.1) {
    freqs.forEach(f => tone(f, dur, type, gain));
  }

  function ascendingChime() {
    // C-E-G-C (major arpeggio, rising)
    [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => tone(f, 0.5, "sine", 0.18, i * 0.12));
  }
  function descendingChime() {
    [1046.50, 783.99, 659.25, 523.25].forEach((f, i) => tone(f, 0.5, "sine", 0.18, i * 0.12));
  }
  function popSound() {
    tone(600 + Math.random() * 400, 0.15, "triangle", 0.2);
    tone(1200, 0.08, "sine", 0.1, 0.05);
  }
  function sparkle() {
    [1800, 2400, 3000].forEach((f, i) => tone(f, 0.15, "sine", 0.08, i * 0.04));
  }

  // Splosh: low-passed noise burst
  function splosh() {
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const dur = 0.45;
    const bufferSize = Math.floor(audioCtx.sampleRate * dur);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      // Envelope: quick attack, decay
      const env = Math.exp(-i / (bufferSize * 0.25));
      data[i] = (Math.random() * 2 - 1) * env;
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buffer;
    const lp = audioCtx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.setValueAtTime(900, t0);
    lp.frequency.exponentialRampToValueAtTime(300, t0 + dur);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.35, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(lp).connect(g).connect(audioCtx.destination);
    src.start(t0);
    // Small pitched blip on top for "splash" character
    tone(440, 0.12, "sine", 0.08, 0.0);
    tone(660, 0.08, "sine", 0.06, 0.05);
  }

  function burp() {
    /* retired in v0.4 */
  }

  function happyChord() {
    // C major triad + octave
    chord([523.25, 659.25, 783.99, 1046.50], 0.7, "triangle", 0.09);
  }

  function triumphant() {
    // Bigger major-7 flourish
    [523.25, 659.25, 783.99, 987.77, 1318.51].forEach((f, i) =>
      tone(f, 0.8, "triangle", 0.1, i * 0.08));
  }

  function windGust() {
    // Dry wind: band-passed noise that rises then falls
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const dur = 1.6;
    const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.setValueAtTime(400, t0);
    bp.frequency.linearRampToValueAtTime(1200, t0 + dur * 0.5);
    bp.frequency.linearRampToValueAtTime(350, t0 + dur);
    bp.Q.setValueAtTime(1.2, t0);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.18, t0 + 0.35);
    g.gain.linearRampToValueAtTime(0.14, t0 + dur * 0.6);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(bp).connect(g).connect(audioCtx.destination);
    src.start(t0); src.stop(t0 + dur);
  }

  function waterLap() {
    // Calm, gentle beach/lake lap. No booms, no big dynamics — just quiet water.
    // Soft brownian-noise whisper with a slow filter breath; nothing else.
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const dur = 1.4;

    const bufLen = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    // Heavily integrated noise → very low-frequency, smooth, shh-like
    let last = 0;
    for (let i = 0; i < data.length; i++) {
      const w = Math.random() * 2 - 1;
      last = (last + 0.02 * w) * 0.997;
      data[i] = last * 3.0;
    }

    const src = audioCtx.createBufferSource();
    src.buffer = buf;

    // Gentle bandpass centered in the "calm water" range (400–900Hz).
    // No big filter sweeps — just a slow breath so it feels alive but never sharp.
    const bp = audioCtx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.setValueAtTime(550, t0);
    bp.frequency.linearRampToValueAtTime(700, t0 + 0.5);
    bp.frequency.linearRampToValueAtTime(500, t0 + dur);
    bp.Q.value = 0.9;

    // High-shelf cut so there's no hiss, no sharp edges
    const hs = audioCtx.createBiquadFilter();
    hs.type = "highshelf";
    hs.frequency.value = 1200;
    hs.gain.value = -12;

    // Soft envelope: slow in, slow out, modest peak (≤4dB below previous)
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.14, t0 + 0.35);
    g.gain.linearRampToValueAtTime(0.10, t0 + 0.9);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);

    src.connect(bp).connect(hs).connect(g).connect(audioCtx.destination);
    src.start(t0); src.stop(t0 + dur);
  }

  function honk() {
    // Brass-ish short low tone
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "square";
    osc.frequency.setValueAtTime(170, t0);
    osc.frequency.exponentialRampToValueAtTime(140, t0 + 0.25);
    const lp = audioCtx.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.setValueAtTime(900, t0);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.18, t0 + 0.02);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.3);
    osc.connect(lp).connect(g).connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.35);
    tone(280, 0.2, "sawtooth", 0.06, 0.0);
  }

  function flutter() {
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const dur = 0.35;
    const size = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < size; i++) {
      const env = Math.exp(-i / (size * 0.35));
      d[i] = (Math.random() * 2 - 1) * env * 0.6;
    }
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = "bandpass"; bp.frequency.value = 2400; bp.Q.value = 3;
    const g = audioCtx.createGain(); g.gain.value = 0.3;
    src.connect(bp).connect(g).connect(audioCtx.destination);
    src.start(t0);
    tone(1800, 0.1, "sine", 0.05, 0);
    tone(2200, 0.1, "sine", 0.05, 0.08);
  }

  function whoosh() {
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const dur = 0.55;
    const size = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < size; i++) {
      const env = Math.exp(-i / (size * 0.45));
      d[i] = (Math.random() * 2 - 1) * env * 0.6;
    }
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const lp = audioCtx.createBiquadFilter();
    lp.type = "lowpass";
    lp.frequency.setValueAtTime(2000, t0);
    lp.frequency.exponentialRampToValueAtTime(300, t0 + dur);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0.3, t0);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
    src.connect(lp).connect(g).connect(audioCtx.destination);
    src.start(t0);
  }

  function step() {
    // Dry scuff/crunch — filtered noise burst + subtle click, way more audible than the old sub-bass thump
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const dur = 0.18;
    const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < data.length; i++) data[i] = (Math.random() * 2 - 1) * 0.8;
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = "bandpass";
    bp.frequency.setValueAtTime(1400, t0);
    bp.frequency.exponentialRampToValueAtTime(600, t0 + dur);
    bp.Q.value = 1.2;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.32, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(bp).connect(g).connect(audioCtx.destination);
    src.start(t0); src.stop(t0 + dur);
    // Low thud underneath for weight
    tone(90, 0.1, "sine", 0.14);
  }
  // Pentatonic berry pluck — pentatonic scale means any combination sounds consonant
  const BERRY_NOTES = [523.25, 587.33, 659.25, 783.99, 880.00, 1046.5]; // C D E G A C (C major pentatonic)
  let lastBerryNoteIdx = -1;
  function pluck() {
    if (!audioReady || !audioCtx) return;
    // Avoid repeating the exact same note back-to-back
    let idx;
    do { idx = (Math.random() * BERRY_NOTES.length) | 0; } while (idx === lastBerryNoteIdx && BERRY_NOTES.length > 1);
    lastBerryNoteIdx = idx;
    const f = BERRY_NOTES[idx];
    const t0 = audioCtx.currentTime;
    // Soft plucky envelope: triangle fundamental + octave harmonic for sparkle
    const osc1 = audioCtx.createOscillator();
    osc1.type = "triangle";
    osc1.frequency.setValueAtTime(f, t0);
    const g1 = audioCtx.createGain();
    g1.gain.setValueAtTime(0.0001, t0);
    g1.gain.exponentialRampToValueAtTime(0.18, t0 + 0.008);
    g1.gain.exponentialRampToValueAtTime(0.001, t0 + 0.28);
    osc1.connect(g1).connect(audioCtx.destination);
    osc1.start(t0); osc1.stop(t0 + 0.3);
    const osc2 = audioCtx.createOscillator();
    osc2.type = "sine";
    osc2.frequency.setValueAtTime(f * 2, t0);
    const g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0.0001, t0);
    g2.gain.exponentialRampToValueAtTime(0.05, t0 + 0.01);
    g2.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
    osc2.connect(g2).connect(audioCtx.destination);
    osc2.start(t0); osc2.stop(t0 + 0.2);
  }
  function happyPop() { tone(660, 0.1, "triangle", 0.15); tone(990, 0.1, "sine", 0.1, 0.05); }
  function risingWhoosh() {
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(300, t0);
    osc.frequency.exponentialRampToValueAtTime(1200, t0 + 0.4);
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.12, t0 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.0001, t0 + 0.45);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.5);
  }
  function tug() { tone(200, 0.1, "sine", 0.16); tone(260, 0.08, "triangle", 0.1, 0.04); }

  // Short low sine with upward sweep — mud bubble pop
  function bloop() {
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    // Bubble pitch sweep (louder, higher — more audible than the old 80→140Hz)
    const osc = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(180, t0);
    osc.frequency.exponentialRampToValueAtTime(420, t0 + 0.12);
    g.gain.setValueAtTime(0.0001, t0);
    g.gain.exponentialRampToValueAtTime(0.35, t0 + 0.012);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.18);
    osc.connect(g).connect(audioCtx.destination);
    osc.start(t0); osc.stop(t0 + 0.22);
    // Wet squelch: short low-pass noise burst for mud texture
    const dur = 0.22;
    const buf = audioCtx.createBuffer(1, Math.floor(audioCtx.sampleRate * dur), audioCtx.sampleRate);
    const d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = (Math.random()*2-1) * (1 - i/d.length) * 0.7;
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const lp = audioCtx.createBiquadFilter();
    lp.type = "lowpass"; lp.frequency.setValueAtTime(900, t0);
    lp.frequency.exponentialRampToValueAtTime(350, t0 + dur);
    const g2 = audioCtx.createGain();
    g2.gain.setValueAtTime(0, t0);
    g2.gain.linearRampToValueAtTime(0.22, t0 + 0.02);
    g2.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(lp).connect(g2).connect(audioCtx.destination);
    src.start(t0); src.stop(t0 + dur);
  }

  // Soft high-passed noise rustle — grass
  function grassRustle() {
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    const dur = 0.32;
    const size = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < size; i++) data[i] = (Math.random()*2-1) * (1 - i/size);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const hp = audioCtx.createBiquadFilter();
    hp.type = "highpass"; hp.frequency.value = 2400; hp.Q.value = 0.6;
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0);
    g.gain.linearRampToValueAtTime(0.09, t0 + 0.05);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + dur);
    src.connect(hp).connect(g).connect(audioCtx.destination);
    src.start(t0); src.stop(t0 + dur);
  }

  // Dig sound: low thud + rising band-passed dust swoosh
  function digSound() {
    if (!audioReady || !audioCtx) return;
    const t0 = audioCtx.currentTime;
    // Low thud
    tone(90, 0.18, "sine", 0.28, 0);
    tone(130, 0.14, "triangle", 0.14, 0.02);
    // Dust swoosh
    const dur = 0.35;
    const size = Math.floor(audioCtx.sampleRate * dur);
    const buf = audioCtx.createBuffer(1, size, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < size; i++) data[i] = (Math.random()*2-1);
    const src = audioCtx.createBufferSource(); src.buffer = buf;
    const bp = audioCtx.createBiquadFilter();
    bp.type = "bandpass"; bp.Q.value = 1.2;
    bp.frequency.setValueAtTime(400, t0 + 0.05);
    bp.frequency.exponentialRampToValueAtTime(2200, t0 + dur);
    const g = audioCtx.createGain();
    g.gain.setValueAtTime(0, t0 + 0.05);
    g.gain.linearRampToValueAtTime(0.12, t0 + 0.1);
    g.gain.exponentialRampToValueAtTime(0.001, t0 + 0.05 + dur);
    src.connect(bp).connect(g).connect(audioCtx.destination);
    src.start(t0 + 0.05); src.stop(t0 + 0.05 + dur);
  }

  /* =============================================================
     HOTSPOT LAYOUT
     Match the overlay to the rendered (letterboxed) image rect.
     ============================================================= */
  const mapImg = document.getElementById("map-img");
  const hotspotsEl = document.getElementById("hotspots");
  const mapScreen = document.getElementById("map-screen");

  function layoutHotspots() {
    if (!mapImg.complete || !mapImg.naturalWidth) return;
    const frame = document.getElementById("map-frame");
    const fw = frame.clientWidth, fh = frame.clientHeight;
    const iw = mapImg.naturalWidth, ih = mapImg.naturalHeight;
    const scale = Math.min(fw / iw, fh / ih);
    const rw = iw * scale, rh = ih * scale;
    const offX = (fw - rw) / 2, offY = (fh - rh) / 2;
    hotspotsEl.style.left = offX + "px";
    hotspotsEl.style.top = offY + "px";
    hotspotsEl.style.width = rw + "px";
    hotspotsEl.style.height = rh + "px";
    // Update child positions
    [...hotspotsEl.children].forEach(el => {
      const idx = +el.dataset.idx;
      const z = ZONES[idx];
      el.style.left = (z.x * rw) + "px";
      el.style.top  = (z.y * rh) + "px";
    });
  }

  function buildHotspots() {
    hotspotsEl.innerHTML = "";
    ZONES.forEach((z, idx) => {
      const btn = document.createElement("button");
      btn.className = "hotspot";
      btn.dataset.idx = idx;
      btn.setAttribute("aria-label", z.name);
      // SVG dot — forced colors via fill attributes, resistant to browser dark-mode inverters
      btn.innerHTML = `<svg class="dot" viewBox="-28 -28 56 56" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <circle cx="0" cy="0" r="22" fill="#ffd040" fill-opacity="0.22"/>
        <circle cx="0" cy="0" r="16" fill="#ffe870" fill-opacity="0.45"/>
        <circle cx="0" cy="0" r="11" fill="#fff4a8" stroke="#ffe870" stroke-width="1.5"/>
        <circle cx="-3" cy="-3" r="3" fill="#ffffff" fill-opacity="0.75"/>
      </svg>`;
      const lbl = document.createElement("span");
      lbl.className = "hotspot-label";
      lbl.textContent = z.name;
      btn.appendChild(lbl);
      btn.addEventListener("click", (e) => {
        e.preventDefault();
        openZone(idx);
      });
      hotspotsEl.appendChild(btn);
    });
    layoutHotspots();
  }

  mapImg.addEventListener("load", () => { buildHotspots(); });
  window.addEventListener("resize", layoutHotspots);
  window.addEventListener("orientationchange", layoutHotspots);
  if (mapImg.complete && mapImg.naturalWidth) buildHotspots();

  if (window.DEV) document.body.classList.add("hotspot-dev");

  /* =============================================================
     ZONE ROUTING
     ============================================================= */
  const zoneScreen = document.getElementById("zone-screen");
  const zoneStage = document.getElementById("zone-stage");
  const backBtn = document.getElementById("back-btn");

  // When true, we're reacting to a hashchange/popstate — don't push another hash entry.
  let suppressHashWrite = false;

  function openZone(idx, opts = {}) {
    const z = ZONES[idx];
    zoneStage.innerHTML = "";
    zoneStage.className = "";
    const renderers = {
      houseboat: renderHouseboat,
      sea: renderSeaOfWave,
      vacation: renderVacation,
      prairie: renderPrairie,
      forest: renderForest,
      maze: renderGoldenMaze,
      desert: renderDesert,
      fog: renderFog,
      path: renderDirtyPath,
      berries: renderDragonberries,
      dragon: renderBerryDragon,
      quicksand: renderQuicksand,
      treasure: renderTreasure,
      compass: renderCompass,
    };
    const fn = renderers[z.kind] || ((s) => renderPZStub(s, z));
    fn(zoneStage, z);
    zoneScreen.classList.add("active");
    sparkle();
    if (!opts.fromHash) {
      // Push zone into URL so browser/phone back button returns to the map.
      suppressHashWrite = true;
      location.hash = z.id;
      // Release the suppression after the hashchange event fires.
      setTimeout(() => { suppressHashWrite = false; }, 0);
    }
  }

  function closeZone(opts = {}) {
    zoneScreen.classList.remove("active");
    zoneStage.innerHTML = "";
    zoneStage.className = "";
    if (!opts.fromHash && location.hash) {
      // If there's a hash, let history handle it (back-arrow should feel like back button).
      suppressHashWrite = true;
      history.back();
      setTimeout(() => { suppressHashWrite = false; }, 0);
    }
  }
  backBtn.addEventListener("click", () => closeZone());

  // Hash-based routing: react to browser back/forward, phone back gesture, deep links.
  function openZoneFromHash() {
    const id = location.hash.replace(/^#/, "");
    if (!id) {
      if (zoneScreen.classList.contains("active")) closeZone({ fromHash: true });
      return;
    }
    const idx = ZONES.findIndex(z => z.id === id);
    if (idx === -1) {
      // Unknown zone in hash — clean it up.
      if (zoneScreen.classList.contains("active")) closeZone({ fromHash: true });
      return;
    }
    openZone(idx, { fromHash: true });
  }
  window.addEventListener("hashchange", () => {
    if (suppressHashWrite) return;
    openZoneFromHash();
  });
  // Deep-link on initial load (e.g. bookmark or refresh on a zone URL).
  if (location.hash) {
    // Defer so hotspots/map img load first; also ensures assets ready.
    window.addEventListener("load", () => openZoneFromHash(), { once: true });
  }

  /* =============================================================
     HELPERS for polished zones
     ============================================================= */
  function sparkleBurst(parent, x, y, count = 14) {
    const colors = ["#ffd66b", "#fff1a8", "#ffb347", "#fff"];
    for (let i = 0; i < count; i++) {
      const s = document.createElement("div");
      s.className = "spark";
      s.style.left = x + "px";
      s.style.top = y + "px";
      const angle = (Math.PI * 2 * i) / count + Math.random() * 0.4;
      const dist = 40 + Math.random() * 70;
      s.style.setProperty("--dx", Math.cos(angle) * dist + "px");
      s.style.setProperty("--dy", Math.sin(angle) * dist + "px");
      s.style.background = colors[i % colors.length];
      s.style.borderRadius = "50%";
      s.style.boxShadow = "0 0 8px rgba(255,220,120,0.9)";
      s.style.animation = `spark-fly ${600 + Math.random()*400}ms ease-out forwards`;
      parent.appendChild(s);
      setTimeout(() => s.remove(), 1100);
    }
    sparkle();
  }

  /* =============================================================
     SEA OF WAVE (polished)
     ============================================================= */
  function renderSeaOfWave(stage) {
    stage.className = "paper-bg";
    const wrap = document.createElement("div");
    wrap.className = "pz-stage";
    wrap.innerHTML = `
      <img class="pz-art" src="./assets/zone-sea-of-wave-web.jpg" alt="Sea of Wave" draggable="false" />
    `;
    stage.appendChild(wrap);
    const img = wrap.querySelector("img");

    function spawnFish(e) {
      const rect = img.getBoundingClientRect();
      // Tap location (fallback to random point in lower half = water)
      let x, y;
      if (e && e.clientX != null) {
        x = e.clientX - rect.left;
        y = e.clientY - rect.top;
      } else {
        x = rect.width * (0.2 + Math.random() * 0.6);
        y = rect.height * (0.6 + Math.random() * 0.3);
      }
      // Clamp so it doesn't spawn off the art
      x = Math.max(30, Math.min(rect.width - 30, x));
      y = Math.max(rect.height * 0.5, Math.min(rect.height - 30, y));

      const fish = document.createElement("div");
      fish.className = "fish";
      // Absolute position relative to wrap (same coord space as img because img is centered in flex)
      const imgOffsetX = img.offsetLeft;
      const imgOffsetY = img.offsetTop;
      fish.style.left = (imgOffsetX + x) + "px";
      fish.style.top  = (imgOffsetY + y) + "px";
      const hue = 10 + Math.random() * 40; // orangey fish
      fish.innerHTML = `

          <polygon points="44,20 58,8 58,32" fill="hsl(${hue},80%,48%)" stroke="#6b3a10" stroke-width="2"/>

  /* =============================================================
     GOLDEN MAZE (polished) — draw glowing gold trail
     ============================================================= */
  function renderGoldenMaze(stage) {
    stage.className = "paper-bg";
    const wrap = document.createElement("div");
    wrap.className = "pz-stage";
    wrap.innerHTML = `
      <img class="pz-art" src="./assets/zone-golden-maze-web.jpg" alt="Golden Maze of Gold" draggable="false" />
      <svg id="maze-svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="goldGrad" x1="0" y1="0" x2="1" y2="1">
            <stop offset="0%" stop-color="#fff1a8"/>
            <stop offset="50%" stop-color="#ffd66b"/>
            <stop offset="100%" stop-color="#c98a1f"/>
          </linearGradient>
        </defs>
      </svg>
    `;
    stage.appendChild(wrap);
    const svg = wrap.querySelector("#maze-svg");

    let drawing = false;
    let pts = [];
    let curPath = null;
    let curLen = 0;

    function getXY(e) {
      const r = svg.getBoundingClientRect();
      const p = e.touches ? e.touches[0] : e;
      return { x: p.clientX - r.left, y: p.clientY - r.top };
    }

    function start(e) {
      e.preventDefault();
      drawing = true;
      pts = [getXY(e)];
      curLen = 0;
      curPath = document.createElementNS("http://www.w3.org/2000/svg", "path");
      curPath.setAttribute("class", "maze-stroke");
      curPath.setAttribute("d", `M ${pts[0].x} ${pts[0].y}`);
      svg.appendChild(curPath);
      tone(660, 0.1, "sine", 0.08);
    }
    function move(e) {
      if (!drawing) return;
      e.preventDefault();
      const p = getXY(e);
      const last = pts[pts.length - 1];
      const dx = p.x - last.x, dy = p.y - last.y;
      const d = Math.hypot(dx, dy);
      if (d < 3) return;
      curLen += d;
      pts.push(p);
      let dAttr = `M ${pts[0].x} ${pts[0].y}`;
      for (let i = 1; i < pts.length; i++) dAttr += ` L ${pts[i].x} ${pts[i].y}`;
      curPath.setAttribute("d", dAttr);
    }
    function end(e) {
      if (!drawing) return;
      e && e.preventDefault && e.preventDefault();
      drawing = false;
      const threshold = 120;
      const last = pts[pts.length - 1];
      const pathEl = curPath;
      if (curLen > threshold) {
        sparkleBurst(wrap, last.x, last.y, 18);
        ascendingChime();
      } else {
        sparkleBurst(wrap, last.x, last.y, 6);
        tone(880, 0.1, "sine", 0.08);
      }
      // Fade this path out
      setTimeout(() => {
        pathEl.classList.add("fading");
        setTimeout(() => pathEl.remove(), 2000);
      }, 400);
      curPath = null;
      pts = [];
      curLen = 0;
    }

    svg.addEventListener("pointerdown", start);
    svg.addEventListener("pointermove", move);
    svg.addEventListener("pointerup", end);
    svg.addEventListener("pointercancel", end);
    svg.addEventListener("pointerleave", end);
  }

  /* =============================================================
     BERRY DRAGON (polished) — tap to burp, 5 taps => smile

  function renderBerryDragon(stage) {

    // Rainbow SVG factory
    function rainbowSVG() {
      const colors = ["#e74c3c","#e67e22","#f1c40f","#2ecc71","#3498db","#5b2c82","#9b59b6"];
      let bands = "";
      colors.forEach((c, i) => {

      });

    function handleTap(e) {

  /* =============================================================
     v0.4 ZONE HELPERS
     ============================================================= */
  function mkStage(stage, id) {
    stage.className = "paper-bg";

  function relTapXY(img, e) {

  /* ---- Polished stub fallback (shouldn't run normally) ---- */

  /* ---- House-boat ---- */

  /* ---- Treeless Prairie — wind through grass ---- */
  function renderPrairie(stage) {
    const { wrap, img } = mkStage(stage, "treeless-prairie");
    const BLADE_COLORS = ["#6fae4a", "#8cc65b", "#5a9e3e", "#a3d06e", "#79b851"];

    // Canvas-based grass field — 700 blades at 60fps on mobile.
    // Each blade is a curved path drawn each frame; bend animates via spring-ish easing,
    // and the rAF loop is paused when nothing is moving.
    const canvas = document.createElement("canvas");
    canvas.style.position = "absolute";
    canvas.style.pointerEvents = "none"; // let taps pass through to the image
    canvas.style.zIndex = "4";
    wrap.appendChild(canvas);

    const ctx = canvas.getContext("2d");
    const dpr = Math.min(window.devicePixelRatio || 1, 2); // cap DPR for perf
    let blades = [];
    let needDraw = true;
    let rafId = null;
    let lastFrame = 0;

    function sizeCanvas() {
      const w = img.clientWidth, h = img.clientHeight;
      if (!w || !h) return false;
      canvas.style.left = img.offsetLeft + "px";
      canvas.style.top  = img.offsetTop  + "px";
      canvas.style.width  = w + "px";
      canvas.style.height = h + "px";
      canvas.width  = Math.floor(w * dpr);
      canvas.height = Math.floor(h * dpr);
      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      return true;
    }

    function populateBlades() {
      if (!sizeCanvas()) return;
      const w = img.clientWidth, h = img.clientHeight;
      blades = [];
      const n = 700;
      for (let i = 0; i < n; i++) {
        const color = BLADE_COLORS[(Math.random() * BLADE_COLORS.length) | 0];
        blades.push({
          x: Math.random() * (w - 10) + 5,
          y: h * 0.25 + Math.random() * (h * 0.72),
          height: 16 + Math.random() * 26,
          width: 1.6 + Math.random() * 2.2,
          color,
          stroke: "#3f6e2a",
          alpha: 0.75 + Math.random() * 0.25,
          // Random baseline lean so the field isn't perfectly upright
          base: (Math.random() - 0.5) * 4,
          bend: 0,         // current bend angle in degrees
          target: 0,       // target bend angle
          velocity: 0,     // for spring dynamics
        });
      }
      needDraw = true;
      requestFrame();
    }

    function drawBlade(b) {
      // Draw a curved blade bending by (base + bend) degrees at its tip.
      const angle = (b.base + b.bend) * Math.PI / 180;
      const tipDx = Math.sin(angle) * b.height;
      const tipDy = -Math.cos(angle) * b.height;
      const tipX = b.x + tipDx;
      const tipY = b.y + tipDy;
      // Control point at roughly 60% height, curved slightly
      const midX = b.x + tipDx * 0.55 + Math.cos(angle) * (b.width * 0.15);
      const midY = b.y + tipDy * 0.55;
      ctx.globalAlpha = b.alpha;
      ctx.fillStyle = b.color;
      ctx.strokeStyle = b.stroke;
      ctx.lineWidth = 0.8;
      ctx.beginPath();
      // Left edge of base
      ctx.moveTo(b.x - b.width / 2, b.y);
      // Up to tip via quadratic
      ctx.quadraticCurveTo(midX - b.width * 0.2, midY, tipX, tipY);
      // Back down the right edge
      ctx.quadraticCurveTo(midX + b.width * 0.2, midY, b.x + b.width / 2, b.y);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
    }

    function draw() {
      const w = img.clientWidth, h = img.clientHeight;
      ctx.clearRect(0, 0, w, h);
      // Sort-ish: draw back to front for a bit of depth (skip actual sort for perf; random y is close enough)
      for (let i = 0; i < blades.length; i++) drawBlade(blades[i]);
      ctx.globalAlpha = 1;
    }

    // Spring physics: pull bend toward target, damped.
    // Returns true if anything is still moving.
    function step(dt) {
      let moving = false;
      const k = 0.018;   // stiffness
      const d = 0.82;    // damping
      for (let i = 0; i < blades.length; i++) {
        const b = blades[i];
        const diff = b.target - b.bend;
        if (Math.abs(diff) < 0.05 && Math.abs(b.velocity) < 0.05 && b.target === 0) {
          b.bend = 0; b.velocity = 0;
          continue;
        }
        b.velocity += diff * k * dt;
        b.velocity *= d;
        b.bend += b.velocity * dt;
        // When we’re very close to target and target != 0, start returning to zero
        if (b.target !== 0 && Math.abs(diff) < 0.4 && Math.abs(b.velocity) < 0.6) {
          b.target = 0;
        }
        moving = true;
      }
      return moving;
    }

    function tick(now) {
      const dt = Math.min(2.5, (now - (lastFrame || now)) / 16.67); // frames-ish
      lastFrame = now;
      const moving = step(dt);
      draw();
      if (moving) {
        rafId = requestAnimationFrame(tick);
      } else {
        rafId = null;
        lastFrame = 0;
      }
    }

    function requestFrame() {
      if (rafId == null) {
        lastFrame = 0;
        rafId = requestAnimationFrame(tick);
      }
    }

    function tryPopulate() {
      // On subsequent visits, the img is newly created but cached — img.complete is true
      // immediately, yet clientWidth may still be 0 until layout happens. Retry via rAF
      // until we actually have dimensions.
      if (!sizeCanvas()) {
        requestAnimationFrame(tryPopulate);
        return;
      }
      populateBlades();
    }

    if (img.complete && img.naturalWidth > 0) tryPopulate();
    else img.addEventListener("load", tryPopulate, { once: true });
    let resizeT;
    const onResize = () => { clearTimeout(resizeT); resizeT = setTimeout(populateBlades, 200); };
    window.addEventListener("resize", onResize);
    backBtn.addEventListener("click", () => {
      window.removeEventListener("resize", onResize);
      if (rafId != null) { cancelAnimationFrame(rafId); rafId = null; }
    }, { once: true });

    img.addEventListener("click", (e) => {
      const { x, y } = relTapXY(img, e);
      windGust();
      grassRustle();
      // Ripple: blades within radius get a bend impulse, delayed by distance.
      // We touch only blades inside a bbox for perf — iterating all 700 is fine but no reason to do work outside the radius.
      const R = 340;
      const R2 = R * R;
      // Drop repeated timers by using a simple time-based delay encoded in the blade itself.
      const now = performance.now();
      for (let i = 0; i < blades.length; i++) {
        const b = blades[i];
        const dx = b.x - x, dy = b.y - y;
        const dd = dx*dx + dy*dy;
        if (dd > R2) continue;
        const dist = Math.sqrt(dd);
        const delay = Math.min(700, dist * 1.6);
        const bend = -18 - Math.random() * 14;
        // Stagger via setTimeout — but all inside the same rAF loop, so timers just set target+velocity.
        setTimeout(() => {
          b.target = bend;
          // Give it a starting velocity so it snaps over more believably
          b.velocity = bend * 0.35;
          requestFrame();
        }, delay);
      }
    });
  }

  /* ---- Fantastic Forest ---- */
  function renderForest(stage) {
    const { wrap, img } = mkStage(stage, "fantastic-forest");
    const animals = ["🦉","🐰","🦊","🐿️","🐻"];
    img.addEventListener("click", (e) => {
      const { x, y } = relTapXY(img, e);
      const p = document.createElement("div");
      p.className = "peeker";
      p.textContent = animals[Math.floor(Math.random() * animals.length)];
      p.style.left = (img.offsetLeft + x) + "px";
      p.style.top  = (img.offsetTop + y - 40) + "px";
      p.style.animation = "peek-in 2s ease-in-out forwards";
      wrap.appendChild(p);
      setTimeout(() => p.remove(), 2100);
      happyPop();
    });
  }

  /* ---- Deserted Desert ---- */
  function renderDesert(stage) {
    const { wrap, img } = mkStage(stage, "deserted-desert");
    // Tumbleweed: chaotic tangle of curved branches, no outer circle (looks less like a wheel)
    function makeTumbleweed() {
      // Generate a random tangle of curvy paths within a 80x80 box
      const paths = [];
      const branches = 14;
      for (let i = 0; i < branches; i++) {
        const x1 = 10 + Math.random() * 60;
        const y1 = 10 + Math.random() * 60;
        const x2 = 10 + Math.random() * 60;
        const y2 = 10 + Math.random() * 60;
        const cx1 = 10 + Math.random() * 60;
        const cy1 = 10 + Math.random() * 60;
        const cx2 = 10 + Math.random() * 60;
        const cy2 = 10 + Math.random() * 60;
        const sw = (1.2 + Math.random() * 1.4).toFixed(1);
        const stroke = Math.random() < 0.5 ? "#7a4a1f" : "#8b5a2b";
        paths.push(`<path d="M${x1} ${y1} C${cx1} ${cy1}, ${cx2} ${cy2}, ${x2} ${y2}" stroke="${stroke}" stroke-width="${sw}"/>`);
      }
      // A few short twigs
      for (let i = 0; i < 10; i++) {
        const x1 = 15 + Math.random() * 50;
        const y1 = 15 + Math.random() * 50;
        const dx = (Math.random() * 16 - 8);
        const dy = (Math.random() * 16 - 8);
        paths.push(`<path d="M${x1} ${y1} L${x1+dx} ${y1+dy}" stroke="#6b3a14" stroke-width="1.2"/>`);
      }
      return `<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke-linecap="round">${paths.join("")}</g>
      </svg>`;
    }
    img.addEventListener("click", (e) => {
      // Tumbleweed rolls at a random screen height, NOT from tap location.
      const tw = document.createElement("div");
      tw.className = "tumbleweed";
      tw.innerHTML = makeTumbleweed();
      const fromLeft = Math.random() < 0.5;
      const startX = fromLeft ? -80 : img.width + 80;
      const endX   = fromLeft ? img.width + 80 : -80;
      // Random band across the lower 60% of the image for a realistic desert ground trajectory.
      const randY  = img.height * (0.35 + Math.random() * 0.55);
      const baseY  = img.offsetTop + randY;
      tw.style.left = (img.offsetLeft + startX) + "px";
      tw.style.top  = baseY + "px";
      tw.style.setProperty("--tx", (endX - startX) + "px");
      tw.style.setProperty("--ty", (-8 - Math.random() * 12) + "px");
      tw.style.setProperty("--tr", (fromLeft ? 1 : -1) * (1080 + Math.random() * 720) + "deg");
      tw.style.animation = "tumble-roll 2400ms linear forwards";
      wrap.appendChild(tw);
      setTimeout(() => tw.remove(), 2500);
      windGust();
    });
  }

  /* ---- Fog of Misdirection ---- */
  function renderFog(stage) {
    const { wrap } = mkStage(stage, "fog");
    // Dim the underlying art a bit for fog vibe
    const zoneImg = wrap.querySelector("img");
    zoneImg.style.opacity = "0.75";
    const CLOUD_SVG = `<svg viewBox="0 0 200 120" xmlns="http://www.w3.org/2000/svg">
      <g fill="#f0f4fa" stroke="#b7c2d4" stroke-width="2">
        <ellipse cx="60" cy="70" rx="50" ry="32"/>
        <ellipse cx="110" cy="55" rx="46" ry="36"/>
        <ellipse cx="150" cy="75" rx="42" ry="30"/>
        <ellipse cx="90" cy="80" rx="40" ry="24"/>
      </g>
    </svg>`;
    function spawnCloud(atX, atY) {
      const c = document.createElement("div");
      c.className = "fog-cloud drift";
      c.innerHTML = CLOUD_SVG;
      const vw = window.innerWidth, vh = window.innerHeight;
      if (atX == null) {
        c.style.left = (Math.random() * (vw - 180)) + "px";
        c.style.top  = (Math.random() * (vh - 240) + 80) + "px";
      } else {
        // Position centered on tap point (cloud svg is ~180x100 with transform offsets)
        c.style.left = (atX - 90) + "px";
        c.style.top  = (atY - 50) + "px";
      }
      c.style.setProperty("--fog-dx", ((Math.random() * 120) - 60) + "px");
      c.style.setProperty("--fog-dy", ((Math.random() * 80) - 40) + "px");
      c.style.setProperty("--fog-dur", (16 + Math.random()*14) + "s");
      c.style.opacity = String(0.75 + Math.random()*0.2);
      c.addEventListener("click", (e) => {
        e.stopPropagation();
        if (c.classList.contains("puff")) return;
        c.classList.remove("drift");
        c.classList.add("puff");
        whoosh();
        setTimeout(() => {
          c.remove();
          setTimeout(spawnCloud, 3000);
        }, 700);
      });
      wrap.appendChild(c);
    }
    // Tapping the underlying image (not a cloud) spawns a new fog cloud at tap point.
    zoneImg.addEventListener("click", (e) => {
      const { x, y } = relTapXY(zoneImg, e);
      spawnCloud(zoneImg.offsetLeft + x, zoneImg.offsetTop + y);
      whoosh();
    });
    for (let i = 0; i < 7; i++) spawnCloud();
  }

  /* ---- Dirty Path of Dirt ---- */
  function renderDirtyPath(stage) {
    const { wrap, img } = mkStage(stage, "dirty-path");
    img.addEventListener("click", (e) => {
      const { x, y } = relTapXY(img, e);
      const f = document.createElement("div");
      f.className = "footprint";
      f.textContent = "👣";
      f.style.left = (img.offsetLeft + x) + "px";
      f.style.top  = (img.offsetTop + y) + "px";
      f.style.setProperty("--fp-rot", (Math.random() * 80 - 40) + "deg");
      wrap.appendChild(f);
      step();
      setTimeout(() => {
        f.classList.add("fading");
        setTimeout(() => f.remove(), 4200);
      }, 26000);
    });
  }

  /* ---- Dragonberries ---- */
  function renderDragonberries(stage) {
    const { wrap, img } = mkStage(stage, "dragonberries");
    const counter = document.createElement("div");
    counter.className = "berry-counter";
    counter.textContent = "Berries: 0";
    stage.appendChild(counter);
    const basket = document.createElement("div");
    basket.className = "basket";
    basket.textContent = "🧺";
    stage.appendChild(basket);

    let count = 0;
    const colors = ["#8e44ad","#c0392b","#2980b9","#d35400","#6b2f8a"];

    img.addEventListener("click", (e) => {
      const { x, y } = relTapXY(img, e);
      const n = 2 + Math.floor(Math.random() * 2);
      for (let i = 0; i < n; i++) {
        const b = document.createElement("div");
        b.className = "berry";
        b.style.background = colors[Math.floor(Math.random()*colors.length)];
        const startX = img.offsetLeft + x + (Math.random()*40 - 20);
        const startY = img.offsetTop + y;
        b.style.left = startX + "px";
        b.style.top  = startY + "px";
        // Aim loosely toward basket (bottom center of stage)
        const stageRect = stage.getBoundingClientRect();
        const basketX = stageRect.width / 2;
        const basketY = stageRect.height - 60;
        const dx = (basketX - startX) + (Math.random()*80 - 40);
        const dy = (basketY - startY);
        b.style.setProperty("--bx", dx + "px");
        b.style.setProperty("--by", dy + "px");
        b.style.setProperty("--br", (Math.random()*720 - 360) + "deg");
        b.style.animation = `berry-tumble ${900 + Math.random()*300}ms cubic-bezier(.4,.1,.7,1) forwards, berry-fade 300ms ease-out ${1000 + Math.random()*200}ms forwards`;
        wrap.appendChild(b);
        setTimeout(() => b.remove(), 1500);
        pluck();
        count++;
      }
      counter.textContent = "Berries: " + count;
    });
  }

  /* ---- Quicksand Pool — bubbling mud ---- */
  function renderQuicksand(stage) {
    const { wrap, img } = mkStage(stage, "quicksand");
    img.addEventListener("click", (e) => {
      const { x, y } = relTapXY(img, e);
      bloop();
      const n = 2 + Math.floor(Math.random() * 3); // 2-4
      for (let i = 0; i < n; i++) {
        const b = document.createElement("div");
        b.className = "mud-bubble";
        const size = 20 + Math.random() * 20;
        b.style.width = size + "px";
        b.style.height = size + "px";
        const ox = (Math.random() * 30 - 15);
        const oy = (Math.random() * 16 - 8);
        b.style.left = (img.offsetLeft + x + ox - size/2) + "px";
        b.style.top  = (img.offsetTop  + y + oy - size/2) + "px";
        b.style.setProperty("--bx", (Math.random() * 40 - 20) + "px");
        b.style.setProperty("--by", (-80 - Math.random() * 70) + "px");
        const dur = 900 + Math.random() * 500;
        b.style.animation = `mud-bubble-rise ${dur}ms ease-out forwards`;
        b.style.animationDelay = (i * 60) + "ms";
        wrap.appendChild(b);
        setTimeout(() => b.remove(), dur + i * 60 + 100);
      }
    });
  }

  function spawnConfetti(parent, x, y) {
    const colors = ["#e74c3c","#f1c40f","#2ecc71","#3498db","#9b59b6","#e67e22","#ff6fb3"];
    const c = document.createElement("div");
    c.className = "confetti";
    c.style.background = colors[Math.floor(Math.random()*colors.length)];
    c.style.left = x + "px";
    c.style.top  = y + "px";
    c.style.setProperty("--cx", (Math.random()*500 - 250) + "px");
    c.style.setProperty("--cy", (-200 - Math.random()*300) + "px");
    c.style.setProperty("--cr", (Math.random()*1440 - 720) + "deg");
    c.style.animation = `confetti-fly ${1200 + Math.random()*800}ms ease-out forwards`;
    parent.appendChild(c);
    setTimeout(() => c.remove(), 2100);
  }

  /* ---- Treasure Mountain — tap mountain to dig up a chest ---- */
  function renderTreasure(stage) {
    const { wrap, img } = mkStage(stage, "treasure-mountain");

    let dug = false;
    let chest = null;

    img.addEventListener("click", (e) => {
      if (dug) return;
      dug = true;
      const { x, y } = relTapXY(img, e);
      const xLeft = img.offsetLeft + x;
      const xTop  = img.offsetTop  + y;
      digSound();

      // Dirt puffs spraying from dig point
      const puffs = 7;
      for (let i = 0; i < puffs; i++) {
        const p = document.createElement("div");
        p.className = "dirt-puff";
        const size = 30 + Math.random() * 20;
        p.style.width = size + "px";
        p.style.height = size + "px";
        p.style.left = xLeft + "px";
        p.style.top  = xTop + "px";
        const angle = (Math.PI * 2 * i) / puffs + (Math.random()*0.6 - 0.3);
        const dist = 60 + Math.random() * 60;
        p.style.setProperty("--dx", (Math.cos(angle) * dist) + "px");
        p.style.setProperty("--dy", (Math.sin(angle) * dist - 30) + "px");
        p.style.animation = `dirt-fly ${650 + Math.random()*250}ms ease-out forwards`;
        wrap.appendChild(p);
        setTimeout(() => p.remove(), 1000);
      }

      // Rise chest after a brief delay
      setTimeout(() => {
        chest = document.createElement("div");
        chest.className = "treasure-chest";
        chest.innerHTML = `<img src="assets/treasure-chest.png" alt="treasure chest"/>`;
        chest.style.left = xLeft + "px";
        chest.style.top  = xTop + "px";
        wrap.appendChild(chest);
        requestAnimationFrame(() => {
          requestAnimationFrame(() => chest.classList.add("risen"));
        });
        triumphant();
        setTimeout(() => {
          for (let i = 0; i < 22; i++) spawnConfetti(wrap, xLeft, xTop);
        }, 300);

        chest.addEventListener("click", (ev) => {
          ev.stopPropagation();
          chest.classList.remove("wobble"); void chest.offsetWidth;
          chest.classList.add("wobble");
          happyChord();
          for (let i = 0; i < 18; i++) spawnConfetti(wrap, xLeft, xTop);
        });
      }, 350);
    });
  }

  /* ---- Compass ---- */
  function renderCompass(stage) {
    const { wrap, img } = mkStage(stage, "compass");

    // Overlay a floating needle on top of the drawn compass art.
    // Compass center in the zone art is roughly 45% x, 58% y (of the cropped image).
    const COMPASS_CX = 0.44;
    const COMPASS_CY = 0.45;

    const overlay = document.createElement("div");
    overlay.className = "compass-needle-overlay";
    overlay.innerHTML = `
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="nPoint" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#e74c3c"/>
            <stop offset="100%" stop-color="#9a1b1b"/>
          </linearGradient>
          <linearGradient id="sPoint" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#f5d36a"/>
            <stop offset="100%" stop-color="#a67a1f"/>
          </linearGradient>
        </defs>
        <g class="compass-needle">
          <polygon points="100,18 112,100 100,108 88,100" fill="url(#nPoint)" stroke="#5a0f0f" stroke-width="1.5"/>
          <polygon points="100,182 112,100 100,92 88,100" fill="url(#sPoint)" stroke="#6b4f14" stroke-width="1.5"/>
        </g>
        <circle cx="100" cy="100" r="10" fill="#3a2608" stroke="#fff4c0" stroke-width="2"/>
      </svg>
    `;
    wrap.appendChild(overlay);
    const needle = overlay.querySelector(".compass-needle");

    function placeOverlay() {
      const w = img.clientWidth, h = img.clientHeight;
      if (!w || !h) return;
      overlay.style.left = (img.offsetLeft + w * COMPASS_CX) + "px";
      overlay.style.top  = (img.offsetTop  + h * COMPASS_CY) + "px";
      // Size the overlay to span the drawn compass wheel (~46% of image width)
      const size = Math.min(w * 0.50, h * 0.66);
      overlay.style.width = size + "px";
    }
    if (img.complete) placeOverlay();
    else img.addEventListener("load", placeOverlay, { once: true });
    const onResize = () => placeOverlay();
    window.addEventListener("resize", onResize);
    backBtn.addEventListener("click", () => window.removeEventListener("resize", onResize), { once: true });

    // Taps land on the image (overlay is pointer-events:none). Compute direction from
    // tap position relative to the compass center.
    img.addEventListener("click", (e) => {
      const { x, y } = relTapXY(img, e);
      const w = img.clientWidth, h = img.clientHeight;
      const cxPx = w * COMPASS_CX;
      const cyPx = h * COMPASS_CY;
      const dx = x - cxPx;
      const dy = y - cyPx;
      if (dx === 0 && dy === 0) return;
      const rad = Math.atan2(dy, dx);
      let deg = rad * 180 / Math.PI + 90;
      deg = (deg + 360) % 360;
      const cardinals = [
        { dir: "N", deg: 0,   freq: 523.25 },
        { dir: "E", deg: 90,  freq: 659.25 },
        { dir: "S", deg: 180, freq: 783.99 },
        { dir: "W", deg: 270, freq: 493.88 },
      ];
      let best = cardinals[0], bestDiff = 999;
      cardinals.forEach(c => {
        const d = Math.min(Math.abs(deg - c.deg), 360 - Math.abs(deg - c.deg));
        if (d < bestDiff) { bestDiff = d; best = c; }
      });
      needle.style.transform = `rotate(${best.deg}deg)`;
      tone(best.freq, 0.45, "sine", 0.22);
      tone(best.freq * 2, 0.25, "sine", 0.08, 0.05);
    });
  }

  /* =============================================================
     FIRST-TOUCH AUDIO UNLOCK + HINT DISMISS
     ============================================================= */
  const hint = document.getElementById("hint");
  let firstTouch = true;
  function onFirstTouch() {
    enableAudio();
    if (firstTouch) {
      firstTouch = false;
      if (hint) { hint.classList.add("hidden"); setTimeout(() => hint.remove(), 800); }
    }
  }
  ["pointerdown", "touchstart", "click"].forEach(ev =>
    document.addEventListener(ev, onFirstTouch, { once: false, passive: true })
  );

  /* =============================================================
     Safety: prevent pinch-zoom weirdness
     ============================================================= */
  document.addEventListener("gesturestart", (e) => e.preventDefault());
  </script>
</body>
